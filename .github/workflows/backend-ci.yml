name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. TypeScript type checking ─────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install
      - run: npm run typecheck

  # ── 2. ESLint — unused vars, type safety, no-duplicate-imports ─────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install
      - run: npm run lint

  # ── 3. Prettier format check ────────────────────────────────────────────────
  format:
    name: Prettier Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install
      - run: npm run format:check

  # ── 4. Production build (tsc -p tsconfig.build.json → dist/) ───────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install
      - name: Compile TypeScript to JavaScript
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist-${{ github.run_number }}
          path: backend/dist/
          retention-days: 3

  # ── 5. Tests with PostgreSQL ────────────────────────────────────────────────
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine   # includes PostGIS + pg_trgm + pgcrypto
        env:
          POSTGRES_USER: koraa_test
          POSTGRES_PASSWORD: koraa_test
          POSTGRES_DB: koraa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Apply database migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: postgresql://koraa_test:koraa_test@localhost:5432/koraa_test

      - name: Seed lookup tables
        run: npm run db:seed
        env:
          DATABASE_URL: postgresql://koraa_test:koraa_test@localhost:5432/koraa_test

      - name: Run tests with coverage
        run: npm run test:ci
        env:
          DATABASE_URL: postgresql://koraa_test:koraa_test@localhost:5432/koraa_test
          NODE_ENV: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-${{ github.run_number }}
          path: backend/coverage/
          retention-days: 14

  # ── 6. Server startup smoke test ────────────────────────────────────────────
  smoke-test:
    name: Server Smoke Test
    runs-on: ubuntu-latest
    needs: [build]
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine   # includes PostGIS + pg_trgm + pgcrypto
        env:
          POSTGRES_USER: koraa_test
          POSTGRES_PASSWORD: koraa_test
          POSTGRES_DB: koraa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Compile TypeScript
        run: npm run build

      - name: Apply database migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: postgresql://koraa_test:koraa_test@localhost:5432/koraa_test

      - name: Start server in background
        run: node dist/server.js &
        env:
          DATABASE_URL: postgresql://koraa_test:koraa_test@localhost:5432/koraa_test
          PORT: 3000
          NODE_ENV: test

      - name: Wait for server to be ready
        run: |
          echo "Waiting for server on port 3000..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Server is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not start within 20 seconds"
          exit 1

      - name: Health check — verify response
        run: |
          RESPONSE=$(curl -sf http://localhost:3000/health)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"ok"' \
            || { echo "Health check failed: unexpected response"; exit 1; }
          echo "Health check passed"

  # ── 7. Duplicate code detection ─────────────────────────────────────────────
  duplication:
    name: Code Duplication Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run jscpd
        run: |
          npx --yes jscpd src \
            --threshold 5 \
            --min-lines 8 \
            --min-tokens 50 \
            --reporters "console,json,threshold" \
            --output ./jscpd-report \
            --ignore "**/__tests__/**,**/*.test.ts,**/migrations/**"

      - name: Upload duplication report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-duplication-report-${{ github.run_number }}
          path: backend/jscpd-report/
          retention-days: 7

  # ── 8. Unused exports & dead code ───────────────────────────────────────────
  unused-exports:
    name: Unused Exports (Knip)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install
      - run: npm run unused -- --reporter compact

  # ── Summary gate — all jobs must pass ───────────────────────────────────────
  ci-passed:
    name: Backend CI Passed
    runs-on: ubuntu-latest
    needs: [typecheck, lint, format, build, test, smoke-test, duplication, unused-exports]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          results='${{ toJSON(needs) }}'
          if echo "$results" | grep -q '"result": "failure"'; then
            echo "One or more backend CI jobs failed."
            exit 1
          fi
          echo "All backend CI checks passed."
